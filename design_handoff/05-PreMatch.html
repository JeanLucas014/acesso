<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Acesso — Pré-Jogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0A0A0A;
  --bg-card: #111111;
  --border: #1F1F1F;
  --text: #FFFFFF;
  --text-2: #A1A1AA;
  --text-3: #52525B;
  --accent: #22C55E;
  --accent-dim: rgba(34,197,94,0.1);
  --danger: #EF4444;
  --warning: #EAB308;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 390px;
  margin: 0 auto;
  min-height: 100dvh;
  padding: 16px 16px 88px;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════
   Match Header
   ═══════════════════════════════ */
.match-header {
  text-align: center;
  margin-bottom: 16px;
}
.match-comp {
  font-size: 11px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
  font-weight: 600;
}
.match-vs {
  font-size: 18px;
  font-weight: 700;
}
.match-vs span { color: var(--text-3); margin: 0 6px; }

/* ═══════════════════════════════
   COMPONENT: OpponentCard
   ═══════════════════════════════ */
.card {
  background: var(--bg-card);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}
.opp-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.opp-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.opp-name { font-size: 13px; font-weight: 600; }
.opp-strength {
  font-size: 12px;
  font-weight: 600;
  color: var(--warning);
}
.opp-results {
  display: flex;
  gap: 4px;
  margin-top: 6px;
}
.opp-r {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 4px;
}
.opp-r.w { background: rgba(34,197,94,0.1); color: var(--accent); }
.opp-r.d { background: rgba(161,161,170,0.08); color: var(--text-2); }
.opp-r.l { background: rgba(239,68,68,0.1); color: var(--danger); }

/* ═══════════════════════════════
   COMPONENT: PitchField (SVG)
   ═══════════════════════════════ */
.pitch-wrapper {
  margin-bottom: 16px;
  border-radius: 10px;
  overflow: hidden;
}
.pitch-wrapper svg {
  display: block;
  width: 100%;
  height: auto;
}

/* ═══════════════════════════════
   COMPONENT: FormationSelector
   ═══════════════════════════════ */
.selectors {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 20px;
}
.selector-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.selector-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  width: 64px;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.selector-dropdown {
  background: var(--bg-card);
  border: 0.5px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}
.selector-dropdown svg {
  width: 14px;
  height: 14px;
  color: var(--text-3);
}
.pill-group {
  display: flex;
  gap: 6px;
  flex: 1;
}
.pill {
  flex: 1;
  padding: 8px 6px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  border: 0.5px solid var(--border);
  background: transparent;
  color: var(--text-2);
  cursor: pointer;
  font-family: inherit;
  text-align: center;
  transition: all 0.15s;
}
.pill.active {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}

/* ═══════════════════════════════
   CTA Button
   ═══════════════════════════════ */
.btn-simulate {
  background: var(--accent);
  color: var(--bg);
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  border: none;
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  width: 100%;
  letter-spacing: -0.2px;
}

/* ═══════════════════════════════
   COMPONENT: BottomNav
   ═══════════════════════════════ */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 390px;
  background: var(--bg);
  border-top: 0.5px solid var(--border);
  display: flex;
  justify-content: space-around;
  padding: 8px 0 20px;
  z-index: 100;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  text-decoration: none;
  color: var(--text-3);
  font-size: 10px;
  font-weight: 500;
}
.nav-item.active { color: var(--accent); }
.nav-item svg { width: 22px; height: 22px; }
</style>
</head>
<body>

<!-- ══════════════════════════════════
     Match Header

<div class="match-header">
  <div class="match-comp">Estadual Mineiro • Rodada 4</div>

        <span class="opp-r w">V</span>
